<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAA Cyber Champions - Fintech Security CTF</title>
    <link rel="shortcut icon" href="{{ Configs.ctf_small_icon }}" type="image/x-icon">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="{{ url_for('views.themes', path='css/fonts.css') }}">
    <link rel="stylesheet" href="{{ url_for('views.themes', path='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('views.themes', path='css/core.css') }}">
    
    {% block stylesheets %}{% endblock %}
    
    {{ Plugins.styles }}
</head>
<body>
    {% include "components/navbar.html" %}
    
    <main role="main">
        {% block content %}{% endblock %}
    </main>
    
    {% include "components/footer.html" %}
    
    <script src="{{ url_for('views.themes', path='js/vendor.bundle.js') }}"></script>
    <script src="{{ url_for('views.themes', path='js/core.js') }}"></script>
    <script src="{{ url_for('views.themes', path='js/helpers.js') }}"></script>
    
    {% block entrypoint %}
    <script src="{{ url_for('views.themes', path='js/pages/main.js') }}"></script>
    {% endblock %}
    
    {% block scripts %}{% endblock %}
    
    {{ Plugins.scripts }}
</body>
</html>
